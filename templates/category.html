<!-- Category Header & Breadcrumbs -->
<nav aria-label="Breadcrumb" style="margin-bottom: 1.5rem; font-size: 0.9rem;">
  <ol style="list-style: none; display: flex; gap: 0.5rem; padding: 0;">
    <li><a href="/">Home</a></li>
    <li style="color: var(--color-text-tertiary);">&gt;</li>
    <li><a href="/categories/">Categories</a></li>
    <li style="color: var(--color-text-tertiary);">&gt;</li>
    <li aria-current="page" style="color: var(--color-text-primary); font-weight: 500;">{{category_name}}</li>
  </ol>
</nav>

<div class="category-layout">
  <!-- Main Category Content -->
  <div>
    <header style="margin-bottom: 2rem; padding: 3rem 2rem; background: linear-gradient(135deg, var(--color-primary-light), var(--color-bg-surface)); border: 1.5px solid var(--color-border); border-radius: var(--radius-lg); position: relative; overflow: hidden; box-shadow: var(--shadow-sm);">
      <div style="position: absolute; top: -50px; right: -50px; width: 150px; height: 150px; background: var(--color-primary-glow); filter: blur(60px); border-radius: 50%;"></div>
      <h1 class="page-title" style="margin-bottom: 0.5rem; font-weight: 800;">{{category_name}} Calculators</h1>
      <p style="font-size: 1.05rem; color: var(--color-text-secondary); max-width: 720px; line-height: 1.5; margin: 0;">{{category_description}}</p>
    </header>

    <!-- Search within Category -->
    <div style="margin-bottom: 2rem;">
      <input type="text" id="category-search" class="input-control" placeholder="Search within {{category_name}} calculators..." aria-label="Search within category" style="border-color: var(--color-border);">
    </div>

    <!-- Category Calculators List -->
    <section style="margin-bottom: 3rem;">
      <div id="category-calculators-grid" class="grid grid-cols-2" style="gap: 1.25rem;">
        {{calculators_list}}
      </div>
      
      <!-- Pagination load more button -->
      <div id="pagination-container" style="text-align: center; margin-top: 2rem; display: none;">
        <button id="load-more-btn" class="btn btn-secondary" style="padding: 0.75rem 2rem; font-size: 0.95rem;">Load More Calculators</button>
      </div>
      <div id="no-category-results" style="text-align: center; padding: 3rem 1rem; display: none; color: var(--color-text-secondary);">
        <span style="font-size: 2rem;">🔍</span>
        <p style="margin-top: 1rem; font-size: 1rem; font-weight: 500;">No calculators found matching that query.</p>
      </div>
    </section>

    <!-- Comprehensive Guide -->
    <section class="card" style="padding: 2.5rem; margin-top: 2rem;">
      <h2 style="font-size: 1.5rem; margin-bottom: 1rem; letter-spacing: -0.02em;">Guide to {{category_name}} Calculations</h2>
      <div style="font-size: 1rem; color: var(--color-text-secondary); line-height: 1.75;">
        {{category_guide}}
      </div>
    </section>
  </div>

  <!-- Sidebar -->
  <aside style="position: sticky; top: 94px; display: flex; flex-direction: column; gap: 1.5rem;">
    <div class="ad-slot ad-slot-sidebar">
      <!-- Responsive Display Ad -->
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-9060973945710499"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
           (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <!-- Other Categories Card -->
    <div class="card" style="padding: 1.5rem;">
      <h3 style="font-size: 1.15rem; margin-bottom: 1.25rem; border-bottom: 1.5px solid var(--color-border); padding-bottom: 0.65rem; letter-spacing: -0.01em;">Other Categories</h3>
      <ul style="list-style: none; display: flex; flex-direction: column; gap: 0.85rem; font-size: 0.95rem; padding: 0;">
        {{sidebar_categories}}
      </ul>
    </div>
  </aside>
</div>

<!-- Pagination & Instant Category Search Script -->
<script type="module">
  document.addEventListener('DOMContentLoaded', () => {
    const grid = document.getElementById('category-calculators-grid');
    const cards = Array.from(grid.querySelectorAll('a.card'));
    const searchInput = document.getElementById('category-search');
    const loadMoreBtn = document.getElementById('load-more-btn');
    const paginationContainer = document.getElementById('pagination-container');
    const noResultsDiv = document.getElementById('no-category-results');

    const ITEMS_PER_PAGE = 12;
    let visibleCards = [...cards];
    let currentPageLimit = ITEMS_PER_PAGE;

    function render() {
      // Hide all first
      cards.forEach(card => card.style.display = 'none');

      // Filter matches
      const query = searchInput ? searchInput.value.toLowerCase().trim() : '';
      if (query === '') {
        visibleCards = [...cards];
      } else {
        visibleCards = cards.filter(card => {
          const title = card.querySelector('h3').textContent.toLowerCase();
          const desc = card.querySelector('p').textContent.toLowerCase();
          return title.includes(query) || desc.includes(query);
        });
      }

      if (visibleCards.length === 0) {
        grid.style.display = 'none';
        if (noResultsDiv) noResultsDiv.style.display = 'block';
        if (paginationContainer) paginationContainer.style.display = 'none';
        return;
      }

      grid.style.display = 'grid';
      if (noResultsDiv) noResultsDiv.style.display = 'none';

      // Show limited cards
      const slice = visibleCards.slice(0, currentPageLimit);
      slice.forEach(card => card.style.display = 'flex');

      // Update Pagination button visibility
      if (visibleCards.length > currentPageLimit) {
        if (paginationContainer) paginationContainer.style.display = 'block';
      } else {
        if (paginationContainer) paginationContainer.style.display = 'none';
      }
    }

    if (searchInput) {
      searchInput.addEventListener('input', () => {
        currentPageLimit = ITEMS_PER_PAGE; // Reset paging
        render();
      });
    }

    if (loadMoreBtn) {
      loadMoreBtn.addEventListener('click', () => {
        currentPageLimit += ITEMS_PER_PAGE;
        render();
      });
    }

    // Initial render
    render();
  });
</script>
